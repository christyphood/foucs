<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>focus-flight-immersive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @font-face {
        font-family: "JOOXSansBrand";
        src: url("./static/JOOXSansBrand-Regular.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      body {
        font-family: "JOOXSansBrand", sans-serif;
      }
      .seat-unit .seat-part {
        transition: background-color 0.12s ease, opacity 0.12s ease;
      }
      .seat-unit.selected .seat-part {
        background-color: rgb(255, 215, 0) !important;
      }
      .seat-unit.selected .seat-armrest {
        opacity: 1 !important;
      }
      #seat-label {
        min-width: 2ch;
      }
      #ticket-content {
        will-change: transform, opacity;
      }
      #ticket-content.exit-up {
        animation: ticket-content-exit 1s ease-in forwards;
        pointer-events: none;
      }
      @keyframes ticket-content-exit {
        from {
          transform: translateY(0);
          opacity: 1;
        }
        to {
          transform: translateY(-180px);
          opacity: 0.05;
        }
      }
      #ticket-content.enter-back-down {
        animation: ticket-content-enter-back 1s ease-in forwards;
        pointer-events: auto;
      }
      @keyframes ticket-content-enter-back {
        from {
          transform: translateY(-180px);
          opacity: 0.05;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      #flight-card-wrap {
        top: 110px;
        height: calc(815px - 110px);
        will-change: opacity;
        overflow: visible;
      }
      #flight-card-wrap.show {
        visibility: visible;
        pointer-events: auto;
      }
      #flight-card {
        font-family: "JOOXSansBrand", sans-serif;
        will-change: transform, opacity;
        opacity: 0;
        transform: translateY(280px);
        height: auto;
      }
      #flight-card .card-divider {
        position: relative;
        width: 100%;
        height: 27px;
        background: #fff;
        flex-shrink: 0;
        overflow: visible;
      }
      #flight-card .card-divider::before {
        content: "";
        position: absolute;
        left: 20px;
        right: 20px;
        top: 50%;
        border-top: 2px dashed #E5E5EA;
      }
      #flight-card .card-divider::after {
        content: "";
        position: absolute;
        left: -13.5px;
        top: 50%;
        transform: translateY(-50%);
        width: 27px;
        height: 27px;
        border-radius: 50%;
        background: rgb(2, 2, 2);
        box-shadow: 300px 0 0 rgb(2, 2, 2);
      }
      #flight-card-wrap.show #flight-card {
        animation: flight-card-enter 1s ease-in forwards;
      }
      @keyframes flight-card-enter {
        from {
          transform: translateY(280px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      #flight-card-wrap.show #flight-card {
        cursor: pointer;
      }
      #flight-card.exit-down {
        animation: flight-card-exit-down 1s ease-in forwards;
        pointer-events: none;
      }
      @keyframes flight-card-exit-down {
        from {
          transform: translateY(0);
          opacity: 1;
        }
        to {
          transform: translateY(280px);
          opacity: 0;
        }
      }

      #status-bar,
      #top-nav {
        will-change: transform, opacity;
      }
      #status-bar.exit-up-nav,
      #top-nav.exit-up-nav {
        animation: top-ui-exit-up 1s ease-in forwards;
        pointer-events: none;
      }
      @keyframes top-ui-exit-up {
        from {
          transform: translateY(0);
          opacity: 1;
        }
        to {
          transform: translateY(-80px);
          opacity: 0;
        }
      }

      #flightmode-wrap {
        position: absolute;
        left: 0;
        top: 0;
        z-index: 3;
        width: 375px;
        height: 815px;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #flightmode-wrap.show {
        visibility: visible;
        pointer-events: auto;
        animation: flightmode-enter 1s ease-in forwards;
      }
      #flightmode-wrap.exit {
        visibility: visible;
        animation: flightmode-exit 1s ease-in forwards;
        pointer-events: none;
      }
      @keyframes flightmode-enter {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes flightmode-exit {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }

      #flight-card.enter-back {
        animation: flight-card-enter 1s ease-in forwards;
        pointer-events: auto;
        cursor: pointer;
      }

      #status-bar.enter-back-nav,
      #top-nav.enter-back-nav {
        animation: top-ui-enter-down 1s ease-in forwards;
        pointer-events: auto;
      }
      @keyframes top-ui-enter-down {
        from {
          transform: translateY(-80px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      #flightmode-frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>

ver" /><div class="relative flex-shrink-0 z-[2] w-[118.5px] flex box-border flex-shrink-0 flex-row justify-center items-center gap-x-[7.08px] py-[9.45px] px-[14.17px] rounded-[118.08px] bg-[rgba(255,255,255,0.1)] border-solid box-border border-[1.18px] [border-color:rgba(255,255,255,0.1)] [backdrop-filter:blur(14.17px)]"><div class="relative flex-shrink-0 z-[1] w-[16px] h-[16px] overflow-hidden"><img src="./static/Vector_24f8bd.svg" class="absolute left-[2px] top-[2px] z-[1] w-[11px] h-[12px]" style="object-fit:cover" /></div><div class="relative flex-shrink-0 z-[2] text-[14.17px] font-[JOOXSansBrand] font-medium leading-[17px] text-[rgb(255,255,255)] flex items-center justify-start h-[17px] w-[40px] whitespace-nowrap">Study</div></div><img src="./static/route-btn_600366.svg" class="relative flex-shrink-0 z-[3] w-[40px] h-[40px] rounded-[20px] overflow-hidden" style="object-fit:cover" /></div></div>
    <script>
      (function () {
        const LEFT_COLS = ["A", "B", "C"];
        const RIGHT_COLS = ["J", "K", "L"];
        const DURATION_MS = 1000;
        const EXIT_DELAY_MS = 500;

        const rowsContainer = document.getElementById("seat-rows");
        const seatLabel = document.getElementById("seat-label");
        const ticketContent = document.getElementById("ticket-content");
        const flightCardWrap = document.getElementById("flight-card-wrap");
        const flightCard = document.getElementById("flight-card");
        const cardSeatLabel = document.getElementById("card-seat-label");
        const statusBar = document.getElementById("status-bar");
        const topNav = document.getElementById("top-nav");
        const backBtn = document.getElementById("back-btn");
        const flightmodeWrap = document.getElementById("flightmode-wrap");
        const flightmodeFrame = document.getElementById("flightmode-frame");
        const checkinSound = document.getElementById("checkin-sound");
        const TRANSITION_MS = 1000;
        let transitionedToFlightmode = false;
        let isTransitioning = false;
        let boardingCardVisible = false;
        let storedDurationMinutes = 10;
        const seats = [];

        Array.from(rowsContainer.children).forEach((rowEl, rowIndex) => {
          const rowNum = rowIndex + 1;
          const groups = [rowEl.children[0], rowEl.children[2]];

          groups.forEach((group, sideIndex) => {
            const cols = sideIndex === 0 ? LEFT_COLS : RIGHT_COLS;
            Array.from(group.children).forEach((unit, colIndex) => {
              const seatId = `${rowNum}${cols[colIndex]}`;
              unit.classList.add("seat-unit");
              unit.dataset.seat = seatId;

              Array.from(unit.children).forEach((part, partIndex) => {
                part.classList.add("seat-part");
                if (partIndex !== 1) {
                  part.classList.add("seat-armrest");
                }
              });

              seats.push(unit);
            });
          });
        });

        let currentSeat = null;
        let audioReady = false;
        let experienceStarted = false;
        const finalSeat = seats[Math.floor(Math.random() * seats.length)];
        const stage = ticketContent.parentElement;

        function unlockAudio() {
          checkinSound.volume = 1;
          checkinSound.muted = true;
          return checkinSound.play().then(() => {
            checkinSound.pause();
            checkinSound.currentTime = 0;
            checkinSound.muted = false;
            audioReady = true;
          });
        }

        function playCheckinSound() {
          checkinSound.muted = false;
          checkinSound.currentTime = 0;
          const attempt = () => checkinSound.play();
          if (audioReady) {
            attempt().catch(() => {});
            return;
          }
          unlockAudio()
            .then(attempt)
            .catch(() => {});
        }

        function bindAudioUnlock() {
          const tryUnlock = () => {
            if (audioReady) return;
            unlockAudio().catch(() => {});
          };
          document.addEventListener("pointerdown", tryUnlock, { passive: true });
          document.addEventListener("keydown", tryUnlock);
        }

        function initExperience() {
          bindAudioUnlock();

          function onStartClick() {
            if (experienceStarted) return;
            experienceStarted = true;
            stage.removeEventListener("click", onStartClick);
            stage.style.cursor = "";
            unlockAudio().catch(() => {});
            startSelection();
          }

          stage.addEventListener("click", onStartClick);
          stage.style.cursor = "pointer";
        }

        function startExitAnimation() {
          cardSeatLabel.textContent = finalSeat.dataset.seat;
          ticketContent.classList.add("exit-up");
          flightCardWrap.classList.remove("invisible", "pointer-events-none");
          flightCardWrap.classList.add("show");
          playCheckinSound();
          boardingCardVisible = true;
        }

        function startSeatPageTransition() {
          if (isTransitioning || !boardingCardVisible || transitionedToFlightmode) {
            return;
          }
          isTransitioning = true;

          flightCard.classList.add("exit-down");
          ticketContent.classList.remove("exit-up");
          ticketContent.classList.add("enter-back-down");

          setTimeout(() => {
            flightCardWrap.classList.add("invisible", "pointer-events-none");
            flightCardWrap.classList.remove("show");
            flightCard.classList.remove("exit-down");
            ticketContent.classList.remove("enter-back-down");
            boardingCardVisible = false;
            isTransitioning = false;
          }, TRANSITION_MS);
        }

        backBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          startSeatPageTransition();
        });

        function resetFlightmode() {
          flightmodeFrame.contentWindow?.postMessage({ type: "flightmode-reset" }, "*");
        }

        function startFlightmodeTransition() {
          if (
            isTransitioning ||
            transitionedToFlightmode ||
            !flightCardWrap.classList.contains("show")
          ) {
            return;
          }
          isTransitioning = true;
          transitionedToFlightmode = true;

          resetFlightmode();

          flightCard.classList.add("exit-down");
          statusBar.classList.add("exit-up-nav");
          topNav.classList.add("exit-up-nav");
          flightmodeWrap.classList.remove("invisible", "pointer-events-none", "exit");
          flightmodeWrap.classList.add("show");

          function sendFlightmodeStart() {
            const w = flightmodeFrame.contentWindow;
            if (!w) return;
            w.postMessage({ type: "set-duration", minutes: storedDurationMinutes }, "*");
            w.postMessage({ type: "autostart" }, "*");
          }

          setTimeout(() => {
            flightCardWrap.classList.add("pointer-events-none");
            isTransitioning = false;
            sendFlightmodeStart();
            setTimeout(sendFlightmodeStart, 200);
            setTimeout(sendFlightmodeStart, 600);
          }, TRANSITION_MS);
        }

        function startBoardingCardTransition() {
          if (isTransitioning || !transitionedToFlightmode) {
            return;
          }
          isTransitioning = true;

          resetFlightmode();

          flightmodeWrap.classList.remove("show");
          flightmodeWrap.classList.add("exit");

          flightCard.classList.remove("exit-down");
          flightCard.classList.add("enter-back");
          statusBar.classList.remove("exit-up-nav");
          topNav.classList.remove("exit-up-nav");
          statusBar.classList.add("enter-back-nav");
          topNav.classList.add("enter-back-nav");
          flightCardWrap.classList.remove("pointer-events-none");

          setTimeout(() => {
            flightmodeWrap.classList.add("invisible", "pointer-events-none");
            flightmodeWrap.classList.remove("exit");
            flightCard.classList.remove("enter-back");
            statusBar.classList.remove("enter-back-nav");
            topNav.classList.remove("enter-back-nav");
            transitionedToFlightmode = false;
            isTransitioning = false;
          }, TRANSITION_MS);
        }

        function resetTicketToInitial() {
          resetFlightmode();
          flightmodeWrap.classList.add("invisible", "pointer-events-none");
          flightmodeWrap.classList.remove("show", "exit");
          flightCardWrap.classList.add("invisible", "pointer-events-none");
          flightCardWrap.classList.remove("show");
          flightCard.classList.remove("exit-down", "enter-back");
          ticketContent.classList.remove("exit-up", "enter-back-down");
          statusBar.classList.remove("exit-up-nav", "enter-back-nav");
          topNav.classList.remove("exit-up-nav", "enter-back-nav");
          transitionedToFlightmode = false;
          boardingCardVisible = false;
          isTransitioning = false;
        }

        function exitToHome() {
          resetTicketToInitial();
          if (window.parent !== window) {
            window.parent.postMessage({ type: "exit-to-home" }, "*");
          }
        }

        flightCard.addEventListener("click", startFlightmodeTransition);

        window.addEventListener("message", (event) => {
          if (!event.data) return;
          if (event.data.type === "flightmode-exit") {
            startBoardingCardTransition();
          }
          if (event.data.type === "flightmode-exit-home") {
            exitToHome();
          }
          if (event.data.type === "set-destination") {
            const code = event.data.code || "";
            const name = event.data.name || "";
            const english = event.data.english || "";
            const shortEnglish = english.split(" ").slice(0, 2).join(" ");
            const el1 = document.getElementById("dest-code-ticket");
            const el2 = document.getElementById("dest-code-card");
            const el3 = document.getElementById("dest-name-card");
            const el4 = document.getElementById("dest-route-card");
            if (el1) el1.textContent = code;
            if (el2) el2.textContent = code;
            if (el3) el3.textContent = name;
            if (el4) el4.textContent = code + "/" + shortEnglish;
          }
          if (event.data.type === "set-duration") {
            const mins = event.data.minutes || 10;
            storedDurationMinutes = mins;
            const label = mins >= 60 ? Math.floor(mins / 60) + "h" + (mins % 60 ? mins % 60 + "m" : "") : mins + " m";
            const el1 = document.getElementById("duration-ticket");
            const el2 = document.getElementById("duration-card");
            if (el1) el1.textContent = label;
            if (el2) el2.textContent = label;
            flightmodeFrame.contentWindow?.postMessage({ type: "set-duration", minutes: mins }, "*");
          }
        });

        function highlightSeat(seatEl) {
          if (currentSeat) {
            currentSeat.classList.remove("selected");
          }
          currentSeat = seatEl;
          if (currentSeat) {
            currentSeat.classList.add("selected");
            seatLabel.textContent = currentSeat.dataset.seat;
          }
        }

        function pickRandomSeat() {
          if (seats.length <= 1) {
            return seats[0];
          }
          let next = seats[Math.floor(Math.random() * seats.length)];
          while (next === currentSeat) {
            next = seats[Math.floor(Math.random() * seats.length)];
          }
          return next;
        }

        function startSelection() {
          const startTime = performance.now();

          function tick(now) {
            const elapsed = now - startTime;

            if (elapsed >= DURATION_MS) {
              highlightSeat(finalSeat);
              setTimeout(startExitAnimation, EXIT_DELAY_MS);
              return;
            }

            highlightSeat(pickRandomSeat());
            const progress = elapsed / DURATION_MS;
            const delay = 220 - progress * 140;
            setTimeout(() => tick(performance.now()), delay);
          }

          tick(startTime);
        }

        initExperience();
      })();
    </script>
